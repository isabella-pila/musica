<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FuzzyMood — Recomendador de Músicas</title>
</head>
<body>
<h1>🎵 FuzzyMood — Recomendador de Músicas</h1>

<form method="POST" action="{% url 'result' %}">
  {% csrf_token %}

  <label>Felicidade (Valence)</label><br>
  <input type="range" step="0.01" name="valence" min="0" max="1" value="0.5"><br><br>

  <label>Energia</label><br>
  <input type="range" step="0.01" name="energy" min="0" max="1" value="0.5"><br><br>

  <label>Acousticness</label><br>
  <input type="range" step="0.01" name="acousticness" min="0" max="1" value="0.5"><br><br>

  <label>Popularidade (0 = underground, 100 = mainstream)</label><br>
  <input type="range" step="1" name="popularity" min="0" max="100" value="50"><br><br>

  <label>Gênero</label><br>
  <select name="genre">
    <option value="pop" selected>Pop</option>
    <option value="rock">Rock</option>
    <option value="hip-hop">Hip-Hop / Rap</option>
    <option value="electronic">Eletrônica</option>
    <option value="funk">Funk</option>
    <option value="sertanejo">Sertanejo</option>
    <option value="pagode">Pagode</option>
    <option value="forro">Forró</option>
    <option value="mpb">MPB</option>
    <option value="samba">Samba</option>
    <option value="axe">Axé</option>
    <option value="jazz">Jazz</option>
    <option value="classical">Clássica</option>
    <option value="blues">Blues</option>
    <option value="reggaeton">Reggaeton</option>
    <option value="r&b">R&B</option>
    <option value="indie">Indie</option>
    <option value="metal">Metal</option>
    <option value="country">Country</option>
  </select><br><br>

  <button type="submit">🎶 Recomendar</button>
</form>
</body>
</html>
