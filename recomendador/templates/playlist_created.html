{% extends 'base.html' %}

  <p style="color: var(--text-muted); font-size: 1.15rem; margin-bottom: 3rem; font-weight: 500;">Sua nova vibe já está salva na sua conta do Spotify.</p>
  
  <a href="{{ playlist_url }}" target="_blank">
